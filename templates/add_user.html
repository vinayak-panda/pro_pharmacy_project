{% extends 'base.html' %}
{% block title %}Add User - Medicine House{% endblock %}
{% block page_title %}Add User{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-7">
<div class="card"><div class="card-body p-4">
  <form method="POST">
    <div class="row g-3">
      <div class="col-md-6"><label class="form-label fw-600">Full Name *</label><input type="text" name="full_name" class="form-control" required></div>
      <div class="col-md-6"><label class="form-label fw-600">Username *</label><input type="text" name="username" class="form-control" required></div>
      <div class="col-md-6"><label class="form-label fw-600">Password *</label><input type="password" name="password" class="form-control" required></div>
      <div class="col-md-6">
        <label class="form-label fw-600">Role *</label>
        <select name="role" class="form-select" required>
          <option value="pharmacist">Pharmacist</option>
          <option value="admin">Admin</option>
          <option value="customer">Customer</option>
        </select>
      </div>
      <div class="col-md-6"><label class="form-label fw-600">Email</label><input type="email" name="email" class="form-control"></div>
      <div class="col-md-6"><label class="form-label fw-600">Phone</label><input type="text" name="phone" class="form-control"></div>
      <div class="col-12 d-flex gap-2 justify-content-end">
        <a href="{{ url_for('users') }}" class="btn btn-outline-secondary">Cancel</a>
        <button type="submit" class="btn btn-primary"><i class="fas fa-save me-2"></i>Create User</button>
      </div>
    </div>
  </form>
</div></div>
</div></div>
{% endblock %}
