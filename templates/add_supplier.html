{% extends 'base.html' %}
{% block title %}Add Supplier - Medicine House{% endblock %}
{% block page_title %}Add Supplier{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-7">
<div class="card"><div class="card-body p-4">
  <form method="POST">
    <div class="row g-3">
      <div class="col-12"><label class="form-label fw-600">Supplier Name *</label><input type="text" name="name" class="form-control" required></div>
      <div class="col-md-6"><label class="form-label fw-600">Contact Person</label><input type="text" name="contact_person" class="form-control"></div>
      <div class="col-md-6"><label class="form-label fw-600">Phone</label><input type="text" name="phone" class="form-control"></div>
      <div class="col-12"><label class="form-label fw-600">Email</label><input type="email" name="email" class="form-control"></div>
      <div class="col-12"><label class="form-label fw-600">Address</label><textarea name="address" class="form-control" rows="2"></textarea></div>
      <div class="col-12 d-flex gap-2 justify-content-end">
        <a href="{{ url_for('suppliers') }}" class="btn btn-outline-secondary">Cancel</a>
        <button type="submit" class="btn btn-primary"><i class="fas fa-save me-2"></i>Save Supplier</button>
      </div>
    </div>
  </form>
</div></div>
</div></div>
{% endblock %}
